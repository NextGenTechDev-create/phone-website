<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 Phone Finder Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
}

.search-box input {
    padding: 10px;
    width: 60%;
    border-radius: 20px;
    border: none;
}

button {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: white;
    color: #667eea;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.buy-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: green;
    color: white;
    border-radius: 10px;
    text-decoration: none;
}

.compare-box {
    background: white;
    color: black;
    padding: 20px;
    margin: 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<h1>📱 Phone Finder Hub</h1>
<p>Compare, search & buy best smartphones</p>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search phones...">
    <button onclick="searchPhones()">Search</button>
</div>

<!-- FILTER -->
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('budget')">Budget</button>
<button onclick="filterCategory('gaming')">Gaming</button>
<button onclick="filterCategory('camera')">Camera</button>

<!-- COMPARE -->
<div class="compare-box">
    <h2>Compare Phones</h2>
    <select id="phone1"></select>
    <select id="phone2"></select>
    <button onclick="comparePhones()">Compare</button>
    <div id="result"></div>
</div>

<!-- CARDS -->
<div class="container" id="phoneContainer"></div>

<script>

let phones = [];

async function loadPhones() {
    phones = [
      {
        name: "iPhone 13",
        camera: "12MP",
        battery: "3240mAh",
        price: "₹50,000",
        category: "camera",
        image: "https://images.unsplash.com/photo-1603898037225-1c5cb6e5d0d1",
        link: "https://amzn.to/4t0auAT"
      },
      {
        name: "Samsung Galaxy M34",
        camera: "50MP",
        battery: "6000mAh",
        price: "₹15,000",
        category: "budget",
        image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
        link: "https://amzn.to/4mfPlQk"
      },
      {
        name: "Realme Narzo 60",
        camera: "64MP",
        battery: "5000mAh",
        price: "₹18,000",
        category: "gaming",
        image: "https://images.unsplash.com/photo-1580910051074-3eb694886505",
        link: "https://amzn.to/4bYIAiI"
      },
      {
        name: "Redmi Note 12",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹13,000",
        category: "budget",
        image: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35d3",
        link: "https://amzn.to/4e96oBD"
      },
      {
        name: "OnePlus Nord CE 3",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹25,000",
        category: "gaming",
        image: "https://images.unsplash.com/photo-1598327105666-5b89351aff97",
        link: "https://amzn.to/48xOzIR"
      },
      {
        name: "iQOO Z6 Lite",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹14,000",
        category: "budget",
        image: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35d3",
        link: "https://amzn.to/4sXkBpR"
      },
      {
        name: "Samsung Galaxy S21 FE",
        camera: "12MP",
        battery: "4500mAh",
        price: "₹30,000",
        category: "camera",
        image: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf",
        link: "https://amzn.to/4vhb52C"
      },
      {
        name: "Redmi Note 11",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹12,000",
        category: "budget",
        image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
        link: "https://amzn.to/4ty6wz1"
      },
      {
        name: "Realme GT Neo 3",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹28,000",
        category: "gaming",
        image: "https://images.unsplash.com/photo-1580910051074-3eb694886505",
        link: "https://amzn.to/3OeJ3Uy"
      },
      {
        name: "OnePlus 11R",
        camera: "50MP",
        battery: "5000mAh",
        price: "₹40,000",
        category: "gaming",
        image: "https://images.unsplash.com/photo-1592750475338-74b7b21085ab",
        link: "https://amzn.to/4c9TnFz"
      }
    ];

    showPhones(phones);
    loadDropdowns();
}

function showPhones(list) {
    const container = document.getElementById("phoneContainer");
    container.innerHTML = "";

    list.forEach(phone => {
        container.innerHTML += `
        <div class="card">
            <img src="${phone.image}">
            <div class="card-content">
                <h3>${phone.name}</h3>
                <p>Camera: ${phone.camera}</p>
                <p>Battery: ${phone.battery}</p>
                <p><strong>${phone.price}</strong></p>
                <a href="${phone.link}" target="_blank" class="buy-btn">Buy Now</a>
            </div>
        </div>`;
    });
}

function filterCategory(cat) {
    if (cat === 'all') return showPhones(phones);
    showPhones(phones.filter(p => p.category === cat));
}

function searchPhones() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    showPhones(phones.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.category.toLowerCase().includes(q)
    ));
}

function loadDropdowns() {
    const p1 = document.getElementById("phone1");
    const p2 = document.getElementById("phone2");

    p1.innerHTML = "";
    p2.innerHTML = "";

    phones.forEach(p => {
        p1.innerHTML += `<option>${p.name}</option>`;
        p2.innerHTML += `<option>${p.name}</option>`;
    });
}

function comparePhones() {
    const p1 = phones.find(p => p.name === document.getElementById("phone1").value);
    const p2 = phones.find(p => p.name === document.getElementById("phone2").value);

    document.getElementById("result").innerHTML = `
    <h3>Comparison</h3>
    <table border="1" style="margin:auto">
        <tr><th>Feature</th><th>${p1.name}</th><th>${p2.name}</th></tr>
        <tr><td>Camera</td><td>${p1.camera}</td><td>${p2.camera}</td></tr>
        <tr><td>Battery</td><td>${p1.battery}</td><td>${p2.battery}</td></tr>
        <tr><td>Price</td><td>${p1.price}</td><td>${p2.price}</td></tr>
    </table>`;
}

loadPhones();

</script>

</body>
</html>
